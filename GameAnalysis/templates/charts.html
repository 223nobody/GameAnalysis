<!-- charts.html -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘数据可视化分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.2/dist/echarts.min.js"></script>
    <script src="{{ url_for('static', filename='js/china.js') }}"></script>
</head>

<body>
    <div class="container">
        <h1>招聘数据可视化分析 - 全面洞察招聘市场</h1>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/charts" class="active">数据图表</a>
        </div>
        <!-- 7个图表容器：第一行3个，第二行4个 -->
        <div class="chart-container row1">
            <div id="salaryChart" class="chart-box">
                <p>城市薪资水平对比</p>
            </div>
            <div id="sankeyChart" class="chart-box">
                <p>城市→职位类型→行业关联</p>
            </div>
            <div id="heatmapChart" class="chart-box">
                <p>企业规模与工作经验要求</p>
            </div>
        </div>
        <div class="chart-container row2">
            <div id="educationChart" class="chart-box">
                <p>学历要求分布</p>
            </div>
            <div id="positionTypeChart" class="chart-box">
                <p>热门职位类型分布</p>
            </div>
            <div id="industryChart" class="chart-box">
                <p>热门行业分布</p>
            </div>
            <div id="locationChart" class="chart-box">
                <p>工作地点分布</p>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
</body>

</html>
